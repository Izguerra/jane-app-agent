[global]
type=global
user_agent=SupaAgent_Gateway

; --- TRANSPORTS ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=147.182.149.234
external_signaling_address=147.182.149.234
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=147.182.149.234
external_signaling_address=147.182.149.234
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

; --- TWILIO TRUNK (INBOUND) ---
[twilio]
type=endpoint
context=from-twilio
disallow=all
allow=opus
allow=ulaw
allow=alaw
direct_media=no
aors=twilio
force_rport=yes
ice_support=yes
rewrite_contact=yes
rtp_symmetric=yes
media_address=147.182.149.234

[twilio]
type=identify
endpoint=twilio
match=54.172.60.0/23,54.244.51.0/24,54.171.127.192/26,35.156.191.128/25,3.122.181.0/24,54.65.63.192/26,13.54.6.128/25

[twilio]
type=aor
contact=sip:54.172.60.0:5060

; --- TWILIO OUTBOUND (for LiveKit → Asterisk → Twilio → Customer) ---
[twilio-outbound]
type=endpoint
context=default
disallow=all
allow=opus
allow=ulaw
allow=alaw
direct_media=no
aors=twilio-outbound
outbound_auth=twilio-outbound-auth
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
media_address=147.182.149.234
from_user=+16478006854

[twilio-outbound]
type=aor
contact=sip:SupaAgent.pstn.twilio.com

[twilio-outbound-auth]
type=auth
auth_type=userpass
username=<YOUR_TWILIO_ACCOUNT_SID>
password=<YOUR_TWILIO_AUTH_TOKEN>

; --- LIVEKIT TRUNK (BIDIRECTIONAL) ---
[livekit]
type=endpoint
context=from-livekit
disallow=all
allow=ulaw
direct_media=no
aors=livekit

force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
media_address=147.182.149.234
send_rpid=yes
trust_id_inbound=yes

; [livekit]
; type=identify
; endpoint=livekit
; match=0.0.0.0/0

[livekit]
type=aor
contact=sip:c54dhff28i8.sip.livekit.cloud

[livekit-auth]
type=auth
auth_type=userpass
username=<YOUR_TWILIO_ACCOUNT_SID>
password=(3R32#23gc=CmPQ
