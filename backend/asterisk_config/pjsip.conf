[global]
type=global
user_agent=SupaAgent_Gateway

; --- TRANSPORTS ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=147.182.149.234
external_signaling_address=147.182.149.234
; SECURITY: Restrict local_net to specific segments
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=147.182.149.234
external_signaling_address=147.182.149.234
local_net=172.16.0.0/12
local_net=192.168.0.0/16
local_net=10.0.0.0/8

; --- TWILIO TRUNK (INBOUND) ---
; Authorization is Ip-based from Twilio
[twilio]
type=endpoint
context=from-twilio
disallow=all
allow=opus
allow=ulaw
allow=alaw
direct_media=no
aors=twilio
force_rport=yes
ice_support=yes
rewrite_contact=yes
rtp_symmetric=yes
media_address=147.182.149.234

[twilio]
type=identify
endpoint=twilio
; SECURITY: Restrict to known Telnyx SIP signaling IPs only.
; match=0.0.0.0/0 was allowing ANY IP to send SIP through Asterisk → LiveKit.
; This was the ROOT CAUSE of runaway SIP probe rooms.
; Telnyx US signaling IPs:
match=192.76.120.10
match=64.16.250.10
; Telnyx US network ranges:
match=192.76.120.128/29
match=192.76.120.136/29
match=192.76.120.144/29
match=192.76.120.160/29
; Telnyx Canada:
match=192.76.120.31
match=64.16.250.13
; Telnyx Europe (if needed):
match=185.246.41.140
match=185.246.41.141
match=185.246.41.0/29
match=185.246.41.8/29
match=185.246.41.16/29

[twilio]
type=aor
contact=sip:54.172.60.0:5060

; --- LIVEKIT TRUNK (OUTBOUND) ---
; We will dial this endpoint via ARI
[livekit]
type=endpoint
context=default
disallow=all
allow=ulaw
direct_media=no
aors=livekit

force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
media_address=147.182.149.234
; Ensure we pass headers transparently if possible
send_rpid=yes
trust_id_inbound=yes

[livekit]
type=aor
; LiveKit SIP trunk contact - this is your specific LiveKit SIP ingress domain
contact=sip:c54dhff28i8.sip.livekit.cloud

[livekit-auth]
type=auth
auth_type=userpass
username=YOUR_TWILIO_ACCOUNT_SID
password=YOUR_PASSWORD
