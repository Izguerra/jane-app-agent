; Asterisk Dialplan for LiveKit Outbound Calls
; This handles calls FROM LiveKit TO customer phones via Twilio

; Context for calls coming FROM LiveKit (outbound to customers)
[from-livekit]
; LiveKit will dial: sip:+14167865786@147.182.149.234
; The phone number becomes ${EXTEN}

exten => _+1NXXNXXXXXX,1,NoOp(Outbound call from LiveKit to ${EXTEN})
same => n,Set(TO_NUMBER=${EXTEN})
same => n,NoOp(Dialing ${TO_NUMBER} via Twilio)
; Dial out via Twilio SIP trunk
same => n,Dial(PJSIP/${TO_NUMBER}@twilio-outbound,60)
same => n,Hangup()

; Fallback for any other number format
exten => _X.,1,NoOp(Outbound call from LiveKit to ${EXTEN})
same => n,Set(TO_NUMBER=${EXTEN})
same => n,NoOp(Dialing ${TO_NUMBER} via Twilio)
same => n,Dial(PJSIP/${TO_NUMBER}@twilio-outbound,60)
same => n,Hangup()

; Keep existing inbound context
[from-twilio]
exten => _outbound_.,1,NoOp(Outbound call to LiveKit room: ${EXTEN})
same => n,Set(ROOM_NAME=${EXTEN})
; same => n,Set(__OUTBOUND_METADATA=${BASE64_ENCODE(${PJSIP_HEADER(read,X-Room-Metadata)})})
; same => n,NoOp(Room metadata: ${METADATA})
; Set variable with inheritance for the new channel
same => n,Answer()
same => n,Wait(1)
; Dial with pre-dial handler to add header
; same => n,Dial(PJSIP/${ROOM_NAME}@livekit,60,b(add_metadata^add_header^1))
same => n,Dial(PJSIP/${ROOM_NAME}@livekit,60)
same => n,Hangup()

exten => _.,1,NoOp(Inbound call from Twilio to ${EXTEN})
same => n,Answer()
same => n,Wait(1)
same => n,Dial(PJSIP/${EXTEN}@livekit,60)
same => n,Hangup()

; Pre-dial handler to add headers to outgoing channel
[add_metadata]
exten => add_header,1,NoOp(Adding X-Room-Metadata header)
; Only add if metadata exists
same => n,GotoIf($["${OUTBOUND_METADATA}" = ""]?skip)
same => n,Set(PJSIP_HEADER(add,X-Room-Metadata)=${OUTBOUND_METADATA})
same => n(skip),Return()
